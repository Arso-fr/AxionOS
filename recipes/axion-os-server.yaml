# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json

name: axion-os-server
description: AxionOS Server edition based on uCore, optimised for server workloads and enterprise stability

base-image: ghcr.io/ublue-os/ucore-minimal
image-version: latest

modules:
  # =========================
  # ESSENTIAL FILES (branding + system configuration)
  # =========================
  - type: files
    files:
      - source: system
        destination: /

  # =========================
  # SERVER TOOLCHAIN
  # =========================
  - type: dnf
    install:
      packages:
        - git
        - curl
        - wget
        - btop
        - less
        - man-db
        - man-pages
        - glibc-langpack-en
        - findutils
        - which
        - tar
        - gzip
        - unzip
        - util-linux-user
        - procps-ng
        - iproute
        - iputils
        - openssh-server
        - chrony
        - rsyslog
        - audit
        - tuned
        - firewalld
        - cockpit
        - cockpit-docker
        - podman
        - buildah
        - skopeo
        - distrobox
        - jq
        - nano

  # =========================
  # SERVER CONFIGURATION
  # =========================
  - type: script
    snippets:
      - |
        # Configure OpenSSH defaults for server deployments
        sed -i 's/^#\?PermitRootLogin.*/PermitRootLogin no/' /etc/ssh/sshd_config || true
        sed -i 's/^#\?PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config || true
        sed -i 's/^#\?ChallengeResponseAuthentication.*/ChallengeResponseAuthentication no/' /etc/ssh/sshd_config || true
        echo 'UseDNS no' >> /etc/ssh/sshd_config

        # Configure firewalld default zone
        firewall-cmd --permanent --set-default-zone=public || true

        # Clean package caches
        dnf clean all
        rm -rf /var/cache/dnf

  # =========================
  # NO FLATPAKS
  # =========================
  - type: default-flatpaks
    configurations:
      - scope: system
        notify: false
        install: []
      - scope: user

  # =========================
  # SIGNING
  # =========================
  - type: signing
