# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json

name: axion-os-gnome
description: Ultra lightweight GNOME edition of AxionOS

base-image: ghcr.io/ublue-os/silverblue-main
image-version: 44

modules:

  # =========================
  # ESSENTIAL FILES (branding minimal)
  # =========================
  - type: files
    files:
      - source: system
        destination: /

  # =========================
  # MINIMAL SYSTEM TOOLS
  # =========================
  - type: dnf
    install:
      packages:
        # Core tools only (curl, wget, distrobox, podman already in base image)
        - git
        - fastfetch
        - btop
        - starship
        - micro

        # GNOME essentials only
        - gnome-tweaks
        - gnome-extensions-app

    remove:
      packages:
        - firefox
        - firefox-langpacks
        - rhythmbox
        - gnome-contacts
        - gnome-maps
        - gnome-tour
        - gnome-weather
        - gnome-calendar

  # =========================
  # MINIMAL FLATPAKS (only essentials)
  # =========================
  - type: default-flatpaks
    configurations:
      - scope: system
        notify: true
        install:
          - org.mozilla.firefox
          - org.gnome.Loupe

      - scope: user

  # =========================
  # CLEAN GNOME EXPERIENCE
  # =========================
  - type: script
    snippets:
      - |
        # Disable GNOME welcome tour
        gsettings set org.gnome.shell welcome-dialog false || true

        # Disable telemetry-like prompts
        gsettings set org.gnome.desktop.privacy report-technical-problems false || true

  # =========================
  # SIGNING
  # =========================
  - type: signing
