name: axion-os

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:

  build:
    name: Prepare axion-os Image
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.set.outputs.image }}

    steps:
      - name: Set base image (axion-os)
        id: set
        run: |
          echo "image=ghcr.io/arso-fr/axion-os:latest" >> $GITHUB_OUTPUT


  iso:
    name: Generate ISO
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: write

    steps:
      - name: Install BlueBuild CLI
        run: |
          curl -L https://github.com/blue-build/cli/releases/latest/download/bluebuild-linux-amd64 -o bluebuild
          chmod +x bluebuild
          sudo mv bluebuild /usr/local/bin/

      - name: Define ISO filename
        id: meta
        run: |
          DATE=$(date +%Y-%m-%d)
          echo "iso_name=axion-os-${DATE}-${GITHUB_RUN_NUMBER}.iso" >> $GITHUB_OUTPUT

      - name: Generate ISO
        run: |
          bluebuild generate-iso \
            --iso-name ${{ steps.meta.outputs.iso_name }} \
            image ${{ needs.build.outputs.image }}

      - name: Generate SHA256
        run: |
          sha256sum ${{ steps.meta.outputs.iso_name }} > ${{ steps.meta.outputs.iso_name }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: axion-os-iso
          path: |
            *.iso
            *.sha256


  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: iso

    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: axion-os-iso

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: axion-os-${{ github.run_number }}
          name: Axion OS Build ${{ github.run_number }}
          files: |
            *.iso
            *.sha256
          generate_release_notes: true
