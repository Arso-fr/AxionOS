name: Build Iso and release (axion-os)

on:
  workflow_dispatch:
    inputs:
      edition:
        description: 'Edition to release: desktop, server, or wsl'
        required: true
        default: 'desktop'
      release_version:
        description: 'Release version (tag name)'
        required: true
        default: 'v1.0.0'

jobs:
  iso:
    name: Generate axion-os ISO
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      EDITION: ${{ github.event.inputs.edition }}
      RELEASE_VERSION: ${{ github.event.inputs.release_version }}

    steps:
      - name: Authorization check
        run: |
          if [ "${{ github.actor }}" != "Arso-fr" ]; then
            echo "❌ Unauthorized user: ${{ github.actor }}"
            exit 1
          fi

      - name: Set release variables
        run: |
          case "${{ env.EDITION }}" in
            desktop)
              echo "BASE_IMAGE=ghcr.io/arso-fr/axion-os-desktop:latest" >> $GITHUB_ENV
              ;;
            server)
              echo "BASE_IMAGE=ghcr.io/arso-fr/axion-os-server:latest" >> $GITHUB_ENV
              ;;
            wsl)
              echo "BASE_IMAGE=ghcr.io/arso-fr/axion-os-wsl-dev:latest" >> $GITHUB_ENV
              ;;
            *)
              echo "Unknown edition: ${EDITION}"
              exit 1
              ;;
          esac
          echo "ISO_NAME=axion-os-${EDITION}-${RELEASE_VERSION}.iso" >> $GITHUB_ENV

      - name: Install BlueBuild CLI
        run: |
          curl -L https://github.com/blue-build/cli/releases/latest/download/bluebuild-linux-amd64 -o bluebuild
          chmod +x bluebuild
          sudo mv bluebuild /usr/local/bin/

      - name: Generate ISO
        run: |
          bluebuild generate-iso \
            --iso-name "${{ env.ISO_NAME }}" \
            image "${{ env.BASE_IMAGE }}"

      - name: Generate SHA256
        run: |
          sha256sum "${{ env.ISO_NAME }}" > "${{ env.ISO_NAME }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: axion-os-iso
          path: |
            *.iso
            *.sha256

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: iso

    permissions:
      contents: write

    env:
      EDITION: ${{ github.event.inputs.edition }}
      RELEASE_VERSION: ${{ github.event.inputs.release_version }}

    steps:
      - name: Authorization check
        run: |
          if [ "${{ github.actor }}" != "Arso-fr" ]; then
            echo "❌ Unauthorized user: ${{ github.actor }}"
            exit 1
          fi

      - name: Download ISO
        uses: actions/download-artifact@v8
        with:
          name: axion-os-iso

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: Axion OS ${{ env.EDITION }} ${{ env.RELEASE_VERSION }}
          files: |
            *.iso
            *.sha256
          generate_release_notes: true
