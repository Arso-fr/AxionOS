name: Build Iso and release (axion-os)

on:
  workflow_dispatch:
    inputs:
      edition:
        description: 'Edition to release: desktop, server, or wsl'
        required: true
        default: 'desktop'
      release_version:
        description: 'Release version (tag name)'
        required: true
        default: 'v1.0.0'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:

  iso:

    name: Generate axion-os ISO
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      # =========================
      # 🔐 OWNER ONLY CHECK
      # =========================
      - name: Authorization check
        run: |
          if [ "${{ github.actor }}" != "Arso-fr" ]; then
            echo "❌ Unauthorized user: ${{ github.actor }}"
            exit 1
          fi

      # =========================
      # INSTALL BLUEBUILD CLI
      # =========================
      - name: Install BlueBuild CLI
        run: |
          curl -L https://github.com/blue-build/cli/releases/latest/download/bluebuild-linux-amd64 -o bluebuild
          chmod +x bluebuild
          sudo mv bluebuild /usr/local/bin/

      # =========================
      # BASE IMAGE
      # =========================
      - name: Set base image (axion-os)
        id: meta
        run: |
          edition=${{ github.event.inputs.edition }}
          case "${edition,,}" in
            desktop)
              echo "image=ghcr.io/arso-fr/axion-os-desktop:latest" >> $GITHUB_OUTPUT
              ;;
            server)
              echo "image=ghcr.io/arso-fr/axion-os-server:latest" >> $GITHUB_OUTPUT
              ;;
            wsl)
              echo "image=ghcr.io/arso-fr/axion-os-wsl-dev:latest" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "Unknown edition: ${edition}"
              exit 1
              ;;
          esac

      # =========================
      # ISO NAME
      # =========================
      - name: Define ISO filename
        id: iso
        run: |
          edition=${{ github.event.inputs.edition }}
          version=${{ github.event.inputs.release_version }}
          echo "iso_name=axion-os-${edition}-${version}.iso" >> $GITHUB_OUTPUT

      # =========================
      # GENERATE ISO
      # =========================
      - name: Generate ISO
        run: |
          bluebuild generate-iso \
            --iso-name ${{ steps.iso.outputs.iso_name }} \
            image ${{ steps.meta.outputs.image }}

      # =========================
      # CHECKSUM
      # =========================
      - name: Generate SHA256
        run: |
          sha256sum ${{ steps.iso.outputs.iso_name }} > ${{ steps.iso.outputs.iso_name }}.sha256

      # =========================
      # ARTIFACT
      # =========================
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: axion-os-iso
          path: |
            *.iso
            *.sha256

  release:

    name: Publish Release
    runs-on: ubuntu-latest
    needs: iso

    permissions:
      contents: write

    steps:

      # =========================
      # 🔐 OWNER ONLY CHECK
      # =========================
      - name: Authorization check
        run: |
          if [ "${{ github.actor }}" != "Arso-fr" ]; then
            echo "❌ Unauthorized user: ${{ github.actor }}"
            exit 1
          fi

      # =========================
      # DOWNLOAD ARTIFACT
      # =========================
      - name: Download ISO
        uses: actions/download-artifact@v4
        with:
          name: axion-os-iso

      # =========================
      # RELEASE
      # =========================
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.release_version }}
          name: Axion OS ${{ github.event.inputs.edition }} ${{ github.event.inputs.release_version }}
          files: |
            *.iso
            *.sha256
          generate_release_notes: true
