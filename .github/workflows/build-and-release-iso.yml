name: Build Iso and release (axion-os)

on:
  schedule:
    - cron: "0 6 1 * *" # 1er du mois à 06:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:

  iso:

    name: Generate axion-os ISO
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      # =========================
      # 🔐 OWNER ONLY CHECK
      # =========================
      - name: Authorization check
        run: |
          if [ "${{ github.actor }}" != "TON_USERNAME_GITHUB" ]; then
            echo "❌ Unauthorized user: ${{ github.actor }}"
            exit 1
          fi

      # =========================
      # INSTALL BLUEBUILD CLI
      # =========================
      - name: Install BlueBuild CLI
        run: |
          curl -L https://github.com/blue-build/cli/releases/latest/download/bluebuild-linux-amd64 -o bluebuild
          chmod +x bluebuild
          sudo mv bluebuild /usr/local/bin/

      # =========================
      # BASE IMAGE
      # =========================
      - name: Set base image (axion-os)
        id: meta
        run: |
          echo "image=ghcr.io/arso-fr/axion-os:latest" >> $GITHUB_OUTPUT

      # =========================
      # ISO NAME
      # =========================
      - name: Define ISO filename
        id: iso
        run: |
          DATE=$(date +%Y-%m-%d)
          echo "iso_name=axion-os-${DATE}-${GITHUB_RUN_NUMBER}.iso" >> $GITHUB_OUTPUT

      # =========================
      # GENERATE ISO
      # =========================
      - name: Generate ISO
        run: |
          bluebuild generate-iso \
            --iso-name ${{ steps.iso.outputs.iso_name }} \
            image ${{ steps.meta.outputs.image }}

      # =========================
      # CHECKSUM
      # =========================
      - name: Generate SHA256
        run: |
          sha256sum ${{ steps.iso.outputs.iso_name }} > ${{ steps.iso.outputs.iso_name }}.sha256

      # =========================
      # ARTIFACT
      # =========================
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: axion-os-iso
          path: |
            *.iso
            *.sha256

  release:

    name: Publish Release
    runs-on: ubuntu-latest
    needs: iso

    permissions:
      contents: write

    steps:

      # =========================
      # 🔐 OWNER ONLY CHECK
      # =========================
      - name: Authorization check
        run: |
          if [ "${{ github.actor }}" != "arso_fr" ]; then
            echo "❌ Unauthorized user: ${{ github.actor }}"
            exit 1
          fi

      # =========================
      # DOWNLOAD ARTIFACT
      # =========================
      - name: Download ISO
        uses: actions/download-artifact@v4
        with:
          name: axion-os-iso

      # =========================
      # RELEASE
      # =========================
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: axion-os-${{ github.run_number }}
          name: Axion OS Build ${{ github.run_number }}
          files: |
            *.iso
            *.sha256
          generate_release_notes: true
