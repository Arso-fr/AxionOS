name: Build Axion OS Image

on:
  workflow_dispatch:
    inputs:
      edition:
        description: 'Edition to build: desktop, server, or wsl'
        required: true
        default: 'desktop'

jobs:
  build:
    name: Build axion-os image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Authorization check
        run: |
          if [ "${{ github.actor }}" != "Arso-fr" ]; then
            echo "❌ Unauthorized user: ${{ github.actor }}"
            exit 1
          fi

      - name: Set edition variables
        run: |
          case "${{ github.event.inputs.edition }}" in
            desktop)
              echo "RECIPE=/axion-os-desktop.yaml" >> $GITHUB_ENV
              echo "IMAGE_NAME=axion-os-desktop" >> $GITHUB_ENV
              ;;
            server)
              echo "RECIPE=/axion-os-server.yaml" >> $GITHUB_ENV
              echo "IMAGE_NAME=axion-os-server" >> $GITHUB_ENV
              ;;
            wsl)
              echo "RECIPE=/axion-os-wsl-dev.yaml" >> $GITHUB_ENV
              echo "IMAGE_NAME=axion-os-wsl-dev" >> $GITHUB_ENV
              ;;
            *)
              echo "Unknown edition: ${{ github.event.inputs.edition }}"
              exit 1
              ;;
          esac

      - name: Build axion-os image
        uses: blue-build/github-action@v1.11
        with:
          recipe: ${{ env.RECIPE }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true
          image_name: ${{ env.IMAGE_NAME }}
