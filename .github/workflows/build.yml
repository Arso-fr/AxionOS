name: axions-os

on:
  schedule:
    - cron: "00 06 * * *"
  push:
    paths-ignore:
      - "**.md"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:

  # =========================
  # 1. BASE IMAGE
  # =========================
  build:
    name: Prepare Axion Image
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.set.outputs.image }}

    steps:
      - name: Set base image (Axion OS)
        id: set
        run: |
          echo "image=ghcr.io/arso-fr/axion-os:latest" >> $GITHUB_OUTPUT


  # =========================
  # 2. ISO GENERATION
  # =========================
  iso:
    name: Generate ISO
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: write

    steps:
      - name: Install BlueBuild CLI
        run: |
          bash <(curl -s https://raw.githubusercontent.com/blue-build/cli/main/install.sh)

      - name: Define ISO filename
        id: meta
        run: |
          DATE=$(date +%Y-%m-%d)
          echo "iso_name=axion-os-${DATE}-${GITHUB_RUN_NUMBER}.iso" >> $GITHUB_OUTPUT

      - name: Generate ISO
        run: |
          bluebuild generate-iso \
            --iso-name ${{ steps.meta.outputs.iso_name }} \
            image ${{ needs.build.outputs.image }}

      - name: Generate SHA256 checksum
        run: |
          sha256sum ${{ steps.meta.outputs.iso_name }} > ${{ steps.meta.outputs.iso_name }}.sha256

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: axion-iso
          path: |
            *.iso
            *.sha256


  # =========================
  # 3. RELEASE
  # =========================
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: iso

    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: axion-iso

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: axion-${{ github.run_number }}
          name: Axion OS Build ${{ github.run_number }}
          files: |
            *.iso
            *.sha256
          generate_release_notes: true
